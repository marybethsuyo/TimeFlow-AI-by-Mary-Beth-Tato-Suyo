<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFlow AI - Mary Beth Tato-Suyo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #4f46e5; }
        
        .tab-active { 
            background-color: #f5f3ff; 
            color: #4f46e5; 
            font-weight: 600; 
            border-right: 4px solid #4f46e5; 
        }

        .voice-active { 
            color: #ef4444 !important; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .no-print { @media print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="app" class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col no-print">
            <div class="p-6 border-b">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                        <i data-lucide="brain"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight text-slate-800">TimeFlow AI</h1>
                        <p class="text-[9px] text-slate-400 uppercase tracking-tighter font-semibold">Mary Beth Tato-Suyo</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-2 space-y-1 mt-4">
                <button onclick="showPage('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="showPage('calendar')" id="btn-calendar" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Calendar
                </button>
                <button onclick="showPage('tasks')" id="btn-tasks" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                    <i data-lucide="check-square" class="w-5 h-5"></i> Tasks
                </button>
                <button onclick="showPage('calc')" id="btn-calc" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                    <i data-lucide="calculator" class="w-5 h-5"></i> Calculator
                </button>
            </nav>

            <div class="p-4 border-t bg-slate-50">
                <p class="text-[10px] text-slate-400 text-center font-medium uppercase tracking-widest">Pavia, PH • 2026</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            
            <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10">
                <div class="flex items-center gap-6 flex-1">
                    <div class="relative w-full max-w-xl">
                        <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="aiSearch" 
                               onkeypress="if(event.key==='Enter') handleAISearch()" 
                               placeholder="AskAI search" 
                               class="w-full pl-12 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                    </div>

                    <div id="weather-widget" onclick="manualWeatherUpdate()" title="Click to refresh weather" 
                         class="flex items-center gap-3 px-4 py-2 bg-sky-50 rounded-2xl border border-sky-100 text-sky-700 cursor-pointer hover:bg-sky-100 transition-all">
                        <i data-lucide="cloud-sun" class="w-5 h-5"></i>
                        <p id="current-temp" class="text-xs font-bold uppercase tracking-tight">Detecting...</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div id="save-indicator" class="text-[10px] text-emerald-500 font-bold opacity-0 transition-opacity duration-500 flex items-center gap-1">
                        <i data-lucide="check-circle" class="w-3 h-3"></i> SAVED
                    </div>
                    <div class="w-8 h-8 rounded-full bg-indigo-100 border-2 border-white shadow-sm flex items-center justify-center text-indigo-600 font-bold text-xs">
                        MT
                    </div>
                </div>
            </header>

            <div id="viewport" class="flex-1 overflow-y-auto p-8 bg-slate-50/50">
                </div>

        </main>
    </div>

    <script src="script.js"></script>

</body>
</html>
