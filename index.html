<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFlow AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-active { background-color: #e0e7ff; color: #4338ca; border-right: 4px solid #4338ca; }
        .voice-active { color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #viewport::-webkit-scrollbar { width: 6px; }
        #viewport::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r flex flex-col">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">TF</div>
                <h1 class="font-bold text-slate-800 tracking-tight">TimeFlow <span class="text-indigo-600">AI</span></h1>
            </div>
            
            <nav class="space-y-1">
                <button id="btn-dashboard" onclick="showPage('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-all">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </button>
                <button id="btn-tasks" onclick="showPage('tasks')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-all">
                    <i data-lucide="check-square" class="w-5 h-5"></i> Tasks
                </button>
                <button id="btn-calendar" onclick="showPage('calendar')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-all">
                    <i data-lucide="calendar" class="w-5 h-5"></i> Calendar
                </button>
                <button id="btn-calc" onclick="showPage('calc')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-all">
                    <i data-lucide="calculator" class="w-5 h-5"></i> Calculator
                </button>
            </nav>
        </div>

        <div class="mt-auto p-6 border-t">
            <div class="bg-indigo-50 p-4 rounded-2xl">
                <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Local Status</p>
                <p id="current-temp" class="text-xs font-bold text-indigo-900">FETCHING WEATHER...</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50/50">
        <header class="h-20 bg-white border-b px-8 flex items-center justify-between shrink-0">
            <div class="flex-1 max-w-xl relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="text" id="aiSearch" onkeypress="if(event.key==='Enter')handleAISearch()" 
                       placeholder="Ask AI or search the web..." 
                       class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
            </div>

            <div class="flex items-center gap-4">
                <span id="save-indicator" class="text-[10px] font-bold text-emerald-500 opacity-0 transition-opacity uppercase tracking-tighter">Changes Saved</span>
                <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-white text-xs font-bold">MT</div>
            </div>
        </header>

        <div id="viewport" class="flex-1 p-8 overflow-y-auto">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
